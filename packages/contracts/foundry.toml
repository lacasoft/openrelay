[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
optimizer = true
optimizer_runs = 200
solc_version = "0.8.25"
evm_version = "cancun"

[profile.ci]
fuzz = { runs = 1000 }

# ── RPC endpoints ─────────────────────────────────────────────────
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base         = "${BASE_RPC_URL}"

# ── Etherscan / Basescan verification ─────────────────────────────
[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
base         = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api",         chain = 8453  }

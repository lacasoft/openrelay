[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openrelay"
version = "0.0.1"
description = "OpenRelay Python SDK — the open payment network"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
dependencies = ["httpx>=0.27.0", "pydantic>=2.7.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project.urls]
Homepage = "https://openrelay.dev"
Repository = "https://github.com/lacasoft/openrelay"
